<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>שכחתי סיסמה · שיבומי</title>
<link rel="stylesheet" href="/admin/css/admin.css">
<style>
  .forgot-phone {
    display: block;
    font-size: clamp(1.75rem, 6vw, 2.25rem);
    font-weight: 700;
    color: var(--admin-accent);
    margin: var(--space-5) 0;
    letter-spacing: -0.02em;
    text-decoration: none;
    line-height: 1.2;
  }
  .forgot-phone:hover { color: var(--admin-accent-hover); }
  .forgot-note {
    padding: var(--space-4);
    background: var(--cream-100);
    border-inline-end: 4px solid var(--admin-accent);
    margin: var(--space-5) 0;
    font-size: var(--fs-14);
    color: var(--admin-text);
    line-height: 1.65;
    border-radius: var(--radius-1);
  }
  .forgot-actions { display: flex; flex-wrap: wrap; gap: var(--space-3); margin-top: var(--space-6); }
</style>
</head>
<body>

<main class="auth-page">
  <div class="auth-page__logo">
    <div class="auth-page__logo-mark">שיבומי</div>
    <div class="auth-page__logo-sub">שחזור גישה</div>
  </div>

  <div class="auth-card">
    <h1>שכחתי סיסמה</h1>
    <p class="auth-card__intro">
      אין איפוס אוטומטי מהאתר — מדיניות אבטחה. התקשרו ונעזור לאמת זהות ולקבל גישה מחדש.
    </p>

    <a href="tel:0507330090" class="forgot-phone">050-733-0090</a>

    <div class="forgot-note">
      אחרי אימות קצר בטלפון תקבלו סיסמה זמנית. מיד אחרי הכניסה — עדכנו סיסמה דרך «שינוי סיסמה» בתפריט.
    </div>

    <div class="forgot-actions">
      <a href="/admin/index.html" class="btn-a btn-a--ghost">חזרה לכניסה</a>
      <a href="tel:0507330090" class="btn-a btn-a--primary">להתקשר</a>
    </div>
  </div>
</main>

<script src="/admin/js/admin.js"></script>
</body>
</html>
